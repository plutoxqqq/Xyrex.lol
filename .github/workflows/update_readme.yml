name: Update README from Discord

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *" # every 5 minutes (optional)

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Run script
        run: node scripts/update-readme-from-discord.js

      - name: Show README (debug)
        run: cat README.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@users.noreply.github.com"
          git add README.md
          git commit -m "Update README from Discord" || echo "No changes"
          git push origin main
